site_name: Radio-Ripper
site_description: Production-grade Webradio-Ripper – Dauerhafte parallele Aufzeichnung von ICY-Metadaten-Streams
site_author: Radio-Ripper Contributors
repo_url: https://github.com/domoskanonos/radioripper
repo_name: domoskanonos/radioripper
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.tabs
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Architektur (arc42):
    - 1. Einfuhrung und Ziele: arc42/01_introduction_and_goals.md
    - 2. Randbedingungen: arc42/02_constraints.md
    - 3. Kontext: arc42/03_context.md
    - 4. Losungsstrategie: arc42/04_solution_strategy.md
    - 5. Bausteinsicht: arc42/05_building_block_view.md
    - 6. Laufzeitsicht: arc42/06_runtime_view.md
    - 7. Verteilungssicht: arc42/07_deployment_view.md
    - 8. Querschnittskonzepte: arc42/08_concepts.md
    - 9. Architekturentscheidungen: arc42/09_design_decisions.md
    - 10. Qualitatsanforderungen: arc42/10_quality_requirements.md
    - 11. Risiken: arc42/11_risks.md
    - 12. Glossar: arc42/12_glossary.md
  - Changelog: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/domoskanonos/radioripper

copyright: Copyright &copy; 2026 Radio-Ripper Contributors
